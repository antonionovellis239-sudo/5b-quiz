<html>
    <head>
        <title>Invito Digitale</title>
        <style>
            :root {
                --bg-color: #050a0f;
                --envelope-color: #ffffff;
                --envelope-shadow: #ff0000; /* Il tuo colore personalizzato */
                --flap-color: #dcdcdc;
                --accent: #00d4ff;
            }

            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                align-items: center;
                background-color: var(--bg-color);
                overflow: hidden;
                font-family: 'Segoe UI', Roboto, sans-serif;
            }


            .bg-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background: 
                    radial-gradient(circle at 20% 30%, rgba(0, 213, 255, 0.13) 0%, transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(0, 47, 255, 0.05) 0%, transparent 40%);
            }

            .bg-grid {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: 
                    linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
                background-size: 50px 50px;
                mask-image: radial-gradient(ellipse at center, black, transparent 90%);
            }

            canvas {
                position: absolute;
                top: 0;
                left: 0;
            }


            #instruction {
                position: relative;
                color: white;
                font-size: 1.1rem;
                margin-bottom: 30px;
                text-align: center;
                letter-spacing: 1px;
                text-transform: uppercase;
                animation: pulse 2s infinite;
                transition: opacity 0.5s;
                z-index: 10;
                bottom: 250px;
            }

            @keyframes pulse {
                0%, 100% { opacity: 0.6; }
                50% { opacity: 1; text-shadow: 0 0 10px var(--accent); }
            }

            .envelope-container {
                position: relative;
                width: 320px;
                height: 220px;
                cursor: pointer;
                transform: translateY(180px);
                transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
                margin-bottom: 50px;
                z-index: 5;
            }

            .envelope-container.active {
                transform: translateY(130px);
            }

            .envelope-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                background-color: var(--envelope-shadow);
                box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            }

            .flap {
                position: absolute;
                top: 0;
                left: 0;
                width: 0;
                height: 0;
                border-left: 160px solid transparent;
                border-right: 160px solid transparent;
                border-top: 110px solid rgb(153, 153, 153);
                transform-origin: top;
                z-index: 3;
                transition: transform 0.5s ease;
                transition-delay: 0.8s;
            }

            .envelope-container.active .flap {
                transform: rotateX(180deg);
                z-index: 0;
            }

            .envelope-front {
                position: absolute;
                bottom: 0;
                width: 0;
                height: 0;
                border-left: 160px solid transparent;
                border-right: 160px solid transparent;
                border-bottom: 110px solid var(--envelope-color);
                z-index: 2;
            }

            .envelope-back {
                position: absolute;
                bottom: 0;
                width: 320px;
                height: 220px;
                background: var(--envelope-color);
                z-index: 1;
            }

        
            .invitation {
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 280px;
                z-index: 1;
                transition: transform 1s ease-out, scale 0.3s ease;
                transition-delay: 1.3s;
            }

            .envelope-container.active .invitation {
                transform: translateX(-50%) translateY(-250px);
            }

            .invitation img {
                width: 100%;
                border-radius: 4px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.4);
                transition: transform 0.3s;
            }


            .expansion-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.95);
                display: none;
                justify-content: center;
                align-items: center;
                z-index: 100;
                cursor: zoom-out;
                opacity: 0;
                transition: opacity 0.4s;
            }

            .expansion-overlay.show {
                display: flex;
                opacity: 1;
            }

            .expanded-img {
                max-width: 90%;
                max-height: 90%;
                transform: scale(0.8);
                transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                border: 1px solid var(--accent);
                box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            }

            .expansion-overlay.show .expanded-img {
                transform: scale(1);
            }
        </style>
    </head>
<body>
    <div class="bg-container">
        <div class="bg-grid"></div>
        <canvas id="particleCanvas"></canvas>
    </div>

    <div id="instruction">
        <div class="container">
            <h1 id="message"></h1>
            <div class="score" id="scoreText"></div>
            <h1 style="font-size: 15px;">Clicca sulla busta per visualizzare il contenuto</h1>
        </div>
    </div>


    <div class="envelope-container" id="envelope">
        <div class="envelope-wrapper">
            <div class="flap"></div>
            
            <div class="invitation" id="invitation">
                <img src="invito.jpeg" alt="Invito">
            </div>
            
            <div class="envelope-front"></div>
            <div class="envelope-back"></div>
        </div>
    </div>

    <div class="expansion-overlay" id="overlay">
        <img src="invito.jpeg" class="expanded-img" alt="Invito Ingrandito">
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const invitation = document.getElementById('invitation');
        const instruction = document.getElementById('instruction');
        const overlay = document.getElementById('overlay');
   
        envelope.addEventListener('click', function() {
            if (!this.classList.contains('active')) {
                this.classList.add('active');
                instruction.style.opacity = '0';
                
                setTimeout(() => {
                    instruction.innerText = "Clicca sull'invito per ingrandirlo";
                    instruction.style.opacity = '1';
                }, 2000);
            }
        });

        invitation.addEventListener('click', function(e) {
            if (envelope.classList.contains('active')) {
                e.stopPropagation();
                overlay.classList.add('show');
            }
        });

        overlay.addEventListener('click', function() {
            this.classList.remove('show');
        });

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.life = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = `rgba(0, 212, 255, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            createParticles();
        });

        initCanvas();
        createParticles();
        animate();

        window.onload=function(){

        let nome=localStorage.getItem("nome");
        let cognome=localStorage.getItem("cognome");
        let score=localStorage.getItem("score");

        if(!nome || !cognome || !score || score < 6){
            window.location.replace("quiz.html");
            return;
        }

        document.getElementById("message").innerText =
        "Complimenti " + nome + " " + cognome + " hai superato il quiz 🎉";

        document.getElementById("scoreText").innerText =
        "Hai totalizzato " + score + " / 10 punti";
        };
        </script>
    </body>
</html>
