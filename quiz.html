<html>
    <head>
        <title>Quiz 5B</title>
        <link rel="stylesheet" href="style.css">
    </head>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:'Segoe UI',sans-serif;
            }

            body{
                background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
                color:white;
                min-height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                overflow-x:hidden;
            }

            .container{
                width:90%;
                max-width:900px;
            }

            .screen{
                display:none;
                animation: fadeIn 0.8s ease;
            }

            .active{
                display:block;
            }


            .home h1{
                font-size:36px;
                margin-bottom:20px;
            }

            input{
                width:100%;
                padding:15px;
                margin:10px 0;
                border:none;
                border-radius:8px;
                font-size:16px;
            }

            button{
                padding:14px 35px;
                border:none;
                border-radius:30px;
                background:#00d4ff;
                color:black;
                font-weight:bold;
                cursor:pointer;
                transition:0.3s;
                margin-top:15px;
            }

            button:hover{
                transform:scale(1.05);
                background:#00a8cc;
            }


            .question-box{
                background:rgba(255,255,255,0.05);
                padding:25px;
                border-radius:15px;
                margin-bottom:20px;
            }

            .answers button{
                display:block;
                width:100%;
                margin:10px 0;
                background:rgba(255,255,255,0.1);
                color:white;
            }

            .answers button:hover{
                background:#00d4ff;
                color:black;
            }

            @keyframes fadeIn{
                from{opacity:0}
                to{opacity:1}
            }
        </style>
    <body>

        <div class="container">
            <div id="home" class="screen active">
            <model-viewer
                src="5b 3d .glb"
                auto-rotate
                camera-controls
                shadow-intensity="1"
                exposure="1"
                camera-orbit="90deg 90deg 10m">
            </model-viewer>
                <h1>Quiz Invito – Classe 5B</h1>
                <p>Inserisci Nome e Cognome</p>
                <input type="text" id="nome" placeholder="Nome">
                <input type="text" id="cognome" placeholder="Cognome">
                <button onclick="startQuiz()">Inizia</button>
            </div>

            <div id="quiz" class="screen">
                <div class="question-box">
                    <h2 id="question"></h2>
                    <div id="answers" class="answers"></div>
                </div>
            </div>

        </div>
        <script src="script.js"></script>
    </body>
</html>
